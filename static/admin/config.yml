backend:
  name: git-gateway
  branch: master
  commit_messages:
    create: "Create {{collection}} “{{slug}}”"
    update: "Update {{collection}} “{{slug}}”"
    delete: "Delete {{collection}} “{{slug}}”"
    uploadMedia: "[skip ci] Upload “{{path}}”"
    deleteMedia: "[skip ci] Delete “{{path}}”"

media_folder: static/img
public_folder: /img

collections:
  - name: "blog"
    label: "Blog"
    folder: "src/pages/blog"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {
          label: "Template Key",
          name: "templateKey",
          widget: "hidden",
          default: "blog-post",
        }
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Featured Post", name: "featuredpost", widget: "boolean" }
      - { label: "Body", name: "body", widget: "markdown" }
      - { label: "Tags", name: "tags", widget: "list" }

  - name: "pages"
    label: "Pages"
    files:
      - file: "src/pages/index.md"
        label: "Home"
        name: "index"
        fields:
          - {
              label: "Template Key",
              name: "templateKey",
              widget: "hidden",
              default: "index-page",
            }
          - { label: Title, name: title, widget: string }
          - { label: Image, name: image, widget: image }
          - { label: Heading, name: heading, widget: string }
          - { label: Subheading, name: subheading, widget: string }

      - file: "src/pages/team/index.md"
        label: "Team"
        name: "team"
        fields:
          - {
              label: "Template Key",
              name: "templateKey",
              widget: "hidden",
              default: "index-page",
            }
          - { label: Title, name: title, widget: string }
          - label: "Bev"
            name: "bev"
            widget: "object"
            fields:
              - { label: "Image", name: "image", widget: "image" }
              - { label: "Description", name: "description", widget: "string" }
              - { label: "Nationality", name: "nationality", widget: "string" }
              - { label: "Certificates", name: "certificates", widget: "list" }
          - label: "Angela"
            name: "angela"
            widget: "object"
            fields:
              - { label: "Image", name: "image", widget: "image" }
              - { label: "Description", name: "description", widget: "string" }
              - { label: "Nationality", name: "nationality", widget: "string" }
              - { label: "Certificates", name: "certificates", widget: "list" }

      - file: "src/pages/fees/index.md"
        label: "Fees"
        name: "fees"
        fields:
          - {
              label: "Template Key",
              name: "templateKey",
              widget: "hidden",
              default: "index-page",
            }
          - { label: Title, name: title, widget: string }
          - label: "Group Lessons"
            name: "groupLessons"
            widget: "list"
            fields:
              - { label: Name, name: name, widget: string }
              - {
                  label: Normal rate per Semester,
                  name: normalRateSemester,
                  widget: string,
                }
              - {
                  label: Reduced rate per Semester,
                  name: reducedRateSemester,
                  widget: string,
                }
          - label: "Private Lessons"
            name: "privateLessons"
            widget: "list"
            fields:
              - { label: Name, name: name, widget: string }
              - {
                  label: Normal rate per Semester,
                  name: normalRateSemester,
                  widget: string,
                }
              - {
                  label: Reduced rate per Semester,
                  name: reducedRateSemester,
                  widget: string,
                }

      - file: "src/pages/contact/index.md"
        label: "Contact"
        name: "contact"
        fields:
          - {
              label: "Template Key",
              name: "templateKey",
              widget: "hidden",
              default: "index-page",
            }
          - { label: Title, name: title, widget: string }
          - label: "Bev"
            name: "bev"
            widget: "object"
            fields:
              - { label: "Telephone", name: "tel", widget: "string" }
              - { label: "E-Mail", name: "email", widget: "string" }
          - label: "Angela"
            name: "angela"
            widget: "object"
            fields:
              - { label: "Telephone", name: "tel", widget: "string" }
              - { label: "E-Mail", name: "emal", widget: "string" }
